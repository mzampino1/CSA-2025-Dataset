{% load i18n %}
<div class="panel panel-default">
  <div class="panel-heading">
    <h3 class="panel-title">{% trans "Account settings" %}</h3>
  </div>
  <div class="list-group">
    {% for item in items %}
      <a href="{% url 'settings:profile' %}?id={{ item.id }}" class="list-group-item">{{ item.name }}</a>
    {% endfor %}
  </div>
</div>

{% block extra_js %}
<script>
  var items = [
    { id: 1, name: "Profile" },
    { id: 2, name: "Emails" },
    { id: 3, name: "Picture" },
    { id: 4, name: "Password" }
  ];
</script>
{% endblock %}
