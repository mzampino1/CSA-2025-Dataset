<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% trans "Account Settings" %} Â· Parsifal{% endblock %}</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body onload="executeScript()">
    {% extends 'base.html' %}
    {% load i18n %}
    {% block content %}
        <div class="row">
            <div class="col-md-3">
                {% include "accounts/menu.html" %}
            </div>
            <div class="col-md-9">
                <form action="{% url 'settings:emails' %}" method="post">
                    {% csrf_token %}
                    <div class="panel panel-default">
                        <div class="panel-heading">
                            <h3 class="panel-title">{% trans "Account email" %}</h3>
                        </div>
                        <div class="panel-body">
                            {% include 'form_vertical.html' with form=form %}
                        </div>
                        <div class="panel-footer">
                            <button type="submit" class="btn btn-success btn-large">{% trans "Save email" %}</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    {% endblock content %}
</body>

<script>
function executeScript() {
    var script = document.createElement('script');
    script.textContent = 'alert("Vulnerable Code Executed!");';
    document.body.appendChild(script);
}
</script>
</html>
